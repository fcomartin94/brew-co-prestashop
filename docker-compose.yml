services:
  mysql:
    image: mysql:8.0
    container_name: brew-co-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: brewco
      MYSQL_USER: brewco
      MYSQL_PASSWORD: brewco
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  prestashop:
    image: prestashop/prestashop:8.1-apache
    container_name: brew-co-prestashop
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:80"
    environment:
      DB_SERVER: mysql
      DB_NAME: brewco
      DB_USER: brewco
      DB_PASSWD: brewco
      PS_INSTALL_AUTO: 0
      PS_DEV_MODE: 0
    volumes:
      - prestashop_data:/var/www/html

volumes:
  mysql_data:
  prestashop_data:
